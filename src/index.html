<!doctype html>
<html lang="en">

  <body>
  <header>

    <div class="container-display">

      <include src="src/partials/nav.html"></include>

      <h1 class="container-display__title"> Tus cócteles<br><em class="container-display__em">favoritos</em></h1>

      <picture>
        <source 
          type="image/webp"
          srcset="images/mojito-display.png?height=600&as=webp 600h,
                  images/mojito-display.png?height=700&as=webp 700h"
          sizes="(max-height: 576px) 600px, 700px">       
        

        <img class="container-display__image container-display__image--top" src="images/mojito-display.png?height=700" alt="imagen de un mojito en primer plano">
      </picture>

      <picture>
        <source 
          srcset="images/pina-colada-coctel.png?height=600&as=webp 600h,
                  images/pina-colada-coctel.png?height=700&as=webp 700h"
        
          sizes="(max-height: 576px) 600px, 700px">

        <img class="container-display__image container-display__image--back" src="images/pina-colada-coctel.png?height=700" alt="imagen con una piña colada y un cóctel"> 
      </picture>
      
      <picture>
        <source 
          srcset="images/leaves-1.png?height=300&as=webp 1x,
                  images/leaves-1.png?height=600&as=webp 2x"
          type="image/webp">        

        <img class="container-display__image--leaves" src="images/leaves-1.png?height=300" alt="Hojas salientes por la zona izquierda">
      </picture>
      
      <picture>
        <source 
          srcset="images/lemon.png?height=200&as=webp ,
                  images/lemon.png?height=400&as=webp 2x"
          type="image/webp">

        <img class="container-display__image--lemon" src="images/lemon.png?height=200" alt="imagen de un limón">
      </picture>
      
    </div>
